name: Build Sable Daily

on:
  schedule:
    - cron: '0 0 * * *'  # every day at midnight UTC
  workflow_dispatch:      # allow manual triggers

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone ryanhcode/sable
        run: git clone --depth 1 https://github.com/ryanhcode/sable.git sable

      - name: Get latest commit SHA
        id: git_info
        working-directory: sable
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update version in gradle.properties
        working-directory: sable
        run: |
          COMMIT_SHA="${{ steps.git_info.outputs.commit_sha }}"
          # Replace the version line, appending -git-<sha>
          sed -i -E "s/^(version=.+)$/\1-git-${COMMIT_SHA}/" gradle.properties
          echo "Updated version:"
          grep '^version=' gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle Wrapper Executable
        working-directory: sable
        run: chmod +x ./gradlew
      - name: Execute Gradle build
        working-directory: sable
        run: ./gradlew build

      - name: Collect built JARs
        id: collect_jars
        run: |
          mkdir -p dist

          find sable/sable-neoforge/build/libs sable/sable-fabric/build/libs \
            -type f \
            -name "*.jar" \
            ! -name "*-sources*" \
            ! -name "*-javadoc*" \
            ! -name "*-dev*" \
            -print \
            -exec cp {} dist/ \;

          echo "Built files:"
          ls -lh dist

          if [ -z "$(find dist -type f -name '*.jar' -print -quit)" ]; then
            echo "No JAR files found."
            exit 1
          fi

      - name: Upload self-use artifact
        uses: actions/upload-artifact@v4
        with:
          name: sable-self-use-${{ steps.git_info.outputs.commit_sha }}
          path: dist/*.jar
          retention-days: 14

      - name: Create release tag name
        id: release_tag
        run: |
          COMMIT_SHA="${{ steps.git_info.outputs.commit_sha }}"
          TAG="git-${COMMIT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Sable build ${{ steps.release_tag.outputs.tag }}"
          body: "Automated daily build from ryanhcode/sable@${{ steps.git_info.outputs.commit_sha }}"
          files: dist/*.jar
